<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Create your PayShield AI account">
    <title>Register — PayShield AI</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="page-bg"></div>

    <div class="auth-container">
        <div class="auth-card animate-in">
            <div class="auth-brand">
                <div class="auth-brand-icon">🛡️</div>
                <div>
                    <h1>Create Account</h1>
                    <p>Join PayShield AI — Fraud Detection System</p>
                </div>
            </div>

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="post" action="/register" class="auth-form">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input id="regUsername" name="username" type="text" placeholder="Choose a username (min 3 chars)" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="input-wrap pw-wrap">
                        <span class="input-icon">🔒</span>
                        <input id="regPassword" name="password" type="password" placeholder="Create a password (min 6 chars)" required autocomplete="new-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('regPassword', this)" aria-label="Toggle password">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regConfirm">Confirm Password</label>
                    <div class="input-wrap pw-wrap">
                        <span class="input-icon">🔒</span>
                        <input id="regConfirm" name="confirm_password" type="password" placeholder="Re-enter your password" required autocomplete="new-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('regConfirm', this)" aria-label="Toggle password">👁️</button>
                    </div>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                    <a class="auth-link" href="/login">← Back to login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePw(id, btn) {
            const inp = document.getElementById(id);
            if (!inp) return;
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
        }
    </script>
</body>
</html>
