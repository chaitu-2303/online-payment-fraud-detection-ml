<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">

  <style>
    .card, .glass.card { color: #111 !important; }
    .card h1, .glass.card h1 { color: #111 !important; }

    label { color: #222 !important; font-weight: 600; display:block; margin-bottom:6px; }
    input {
      width: 100%;
      padding: 12px 44px 12px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.18);
      background: rgba(255,255,255,0.95) !important;
      color: #111 !important;
      outline: none;
      box-sizing: border-box;
    }
    input::placeholder { color: rgba(0,0,0,0.45) !important; }

    .field { margin: 12px 0; }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-10%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 6px;
      border-radius: 8px;
      color: #111;
    }
    .pw-toggle:hover { background: rgba(0,0,0,0.06); }
    .pw-toggle:focus { outline: 2px solid rgba(0,0,0,0.25); }

    .actions { margin-top: 14px; display:flex; gap:12px; align-items:center; }
    .btn { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; }
    .link { color: #0b57d0 !important; font-weight: 600; text-decoration: underline; }

    .error-box{
      margin:12px 0; padding:12px 16px; border-radius:12px;
      background: rgba(239,68,68,.12); color:#ff9999 !important;
      border: 1px solid rgba(239,68,68,.35); backdrop-filter: blur(8px);
      box-shadow: inset 0 0 1px rgba(239,68,68,.15);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="glass card">
      <h1>Register</h1>

      {% if error %}
        <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="post" action="/register">
        <div class="field">
          <label>Username</label>
          <input name="username" placeholder="Choose username" required />
        </div>

        <div class="field pw-wrap">
          <label>Password</label>
          <input id="regPassword" type="password" name="password" placeholder="Create password" required />
          <button type="button" class="pw-toggle" onclick="togglePassword('regPassword', this)" aria-label="Show/Hide password">
            👁️
          </button>
        </div>

        <div class="field pw-wrap">
          <label>Confirm Password</label>
          <input id="regConfirmPassword" type="password" name="confirm_password" placeholder="Confirm password" required />
          <button type="button" class="pw-toggle" onclick="togglePassword('regConfirmPassword', this)" aria-label="Show/Hide password">
            👁️
          </button>
        </div>

        <div class="actions">
          <button class="btn" type="submit">Register</button>
          <a class="link" href="/login">Back to login</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    function togglePassword(inputId, btn){
      const inp = document.getElementById(inputId);
      if(!inp) return;
      if(inp.type === "password"){
        inp.type = "text";
        btn.textContent = "🙈";
      } else {
        inp.type = "password";
        btn.textContent = "👁️";
      }
    }
  </script>
</body>
</html>
