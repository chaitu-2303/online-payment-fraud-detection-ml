<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">

  <style>
    .card, .glass.card { color: #111 !important; }
    .card h1, .glass.card h1 { color: #111 !important; }

    label { color: #222 !important; font-weight: 600; display:block; margin-bottom:6px; }
    input {
      width: 100%;
      padding: 12px 44px 12px 12px; /* right padding for eye */
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.18);
      background: rgba(255,255,255,0.95) !important;
      color: #111 !important;
      outline: none;
      box-sizing: border-box;
    }
    input::placeholder { color: rgba(0,0,0,0.45) !important; }

    .field { margin: 12px 0; }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-10%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 6px;
      border-radius: 8px;
      color: #111;
    }
    .pw-toggle:hover { background: rgba(0,0,0,0.06); }
    .pw-toggle:focus { outline: 2px solid rgba(0,0,0,0.25); }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .remember-row input[type="checkbox"] {
      appearance: none;
      width: 22px;
      height: 22px;
      padding: 0;
      margin: 0;
      border: 1.5px solid rgba(102,126,234,.4);
      border-radius: 6px;
      background: linear-gradient(135deg,rgba(224,255,255,.6) 0%,rgba(240,220,255,.6) 100%);
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
      flex-shrink: 0;
      font-size: 14px;
      line-height: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .remember-row input[type="checkbox"]:hover {
      border-color: rgba(102,126,234,.6);
      background: linear-gradient(135deg,rgba(230,248,255,.8) 0%,rgba(245,230,255,.8) 100%);
      box-shadow: 0 0 8px rgba(102,126,234,.15);
    }
    .remember-row input[type="checkbox"]:checked {
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      border-color: rgba(102,126,234,.8);
      box-shadow: 0 0 12px rgba(102,126,234,.3);
      color: white;
    }
    .remember-row input[type="checkbox"]:checked::after {
      content: '✅';
      font-size: 16px;
    }
    .remember-row label { margin: 0; font-weight: 500; }

    .actions { margin-top: 14px; display:flex; gap:12px; align-items:center; }
    .btn { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; }
    .link { color: #0b57d0 !important; font-weight: 600; text-decoration: underline; }

    .error-box{
      margin:12px 0; padding:12px 16px; border-radius:12px;
      background: rgba(239,68,68,.12); color:#ff9999 !important;
      border: 1px solid rgba(239,68,68,.35); backdrop-filter: blur(8px);
      box-shadow: inset 0 0 1px rgba(239,68,68,.15);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="glass card">
      <h1>Login</h1>

      {% if error %}
        <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="field">
          <label>Username</label>
          <input name="username" placeholder="Enter username" required />
        </div>

        <div class="field pw-wrap">
          <label>Password</label>
          <input id="loginPassword" type="password" name="password" placeholder="Enter password" required />
          <button type="button" class="pw-toggle" onclick="togglePassword('loginPassword', this)" aria-label="Show/Hide password">
            👁️
          </button>
        </div>

        <div class="remember-row">
          <input id="rememberMe" type="checkbox" name="remember_me">
          <label for="rememberMe">Remember me</label>
        </div>

        <div class="actions">
          <button class="btn" type="submit">Login</button>
          <a class="link" href="/register">Create account</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    function togglePassword(inputId, btn){
      const inp = document.getElementById(inputId);
      if(!inp) return;
      if(inp.type === "password"){
        inp.type = "text";
        btn.textContent = "🙈";
      } else {
        inp.type = "password";
        btn.textContent = "👁️";
      }
    }
  </script>
</body>
</html>
