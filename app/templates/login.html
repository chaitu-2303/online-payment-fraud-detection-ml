<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Login to PayShield AI — Online Payment Fraud Detection System">
    <title>Login — PayShield AI</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="page-bg"></div>

    <div class="auth-container">
        <div class="auth-card animate-in">
            <div class="auth-brand">
                <div class="auth-brand-icon">🛡️</div>
                <div>
                    <h1>PayShield AI</h1>
                    <p>Online Payment Fraud Detection</p>
                </div>
            </div>

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login" class="auth-form">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input id="loginUsername" name="username" type="text" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrap pw-wrap">
                        <span class="input-icon">🔒</span>
                        <input id="loginPassword" name="password" type="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" aria-label="Toggle password">👁️</button>
                    </div>
                </div>

                <div class="remember-row">
                    <input id="rememberMe" type="checkbox" name="remember_me">
                    <label for="rememberMe">Remember me for 30 days</label>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                    <a class="auth-link" href="/register">Create an account →</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePw(id, btn) {
            const inp = document.getElementById(id);
            if (!inp) return;
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
        }
    </script>
</body>
</html>
